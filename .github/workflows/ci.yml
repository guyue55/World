name: CI

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]

concurrency:
  group: worldos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worldos-release-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:release
      - run: npm run check:worldos-rc
      - run: npm run evidence:kernel-local
      - run: npm run evidence:worldos-external-template
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worldos-release-evidence
          path: |
            docs/90-archive/reports/world-kernel-local-evidence.json
            docs/90-archive/reports/worldos-external-evidence-template.json
            data/world-kernel/worldos-1-release-candidate-v1.json
            data/world-kernel/worldos-1-external-evidence-template-v1.json

  static-boundary:
    name: static-boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Public runtime boundary
        run: node scripts/check-public-app-r8-imports.mjs


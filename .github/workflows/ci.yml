name: World Kernel CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: world-kernel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-boundary:
    name: static-boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Public runtime boundary
        run: node scripts/check-public-app-r8-imports.mjs

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --progress=false --loglevel=error

      - name: Repository checks
        run: npm run check

      - name: Route checks
        run: npm run check:routes

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

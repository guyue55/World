name: World Kernel CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: world-kernel-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-boundary:
    name: static-boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Public runtime boundary
        run: node scripts/check-public-app-r8-imports.mjs

  install-probe:
    name: install-probe
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Print environment
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Probe dependency install
        run: timeout 360s npm ci --ignore-scripts --no-audit --no-fund --omit=optional --prefer-offline --progress=false --loglevel=notice
